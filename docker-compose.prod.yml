version: '3.9'

# Production overrides — use with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  nginx:
    image: chromadb/chroma:0.4.24
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
    restart: always

  frontend:
    ports: []  # Remove direct port exposure in prod — nginx handles it
    restart: always
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    ports: []
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  ai-engine:
    ports: []
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'

  chromadb:
    ports: []  # Internal only
    restart: always

  mongo:
    ports: []  # Internal only
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASS}
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  nginx-cache:
